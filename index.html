<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CastNet – Fly Fishing Patagonia</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="hero">
    <header class="navbar">
      <img src="assets/logo.svg" alt="CastNet Logo" class="logo"/>
      <nav>
        <a href="#">Trips</a>
        <a href="#">Anglers</a>
        <a href="#">Guides</a>
        <a href="#">Log in</a>
      </nav>
    </header>

    <main class="content">
      <h1 class="title">CastNet</h1>
      <p class="subtitle">Connecting Anglers &amp; Guides</p>
      <a href="#" class="cta-button">Plan Your Next Cast</a>

      <section class="cards">
        <div class="card">
          <div class="card-icon">
            <img src="assets/fish1.svg" alt="Fish Icon">
          </div>
          <div class="info">
            <h3>Mar 12 – 14</h3>
            <p>Near Puerto Natales</p>
          </div>
          <img class="card-map" src="assets/map1.png" alt="Map 1">
        </div>

        <div class="card">
          <div class="card-icon">
            <img src="assets/fish2.svg" alt="Fish Icon">
          </div>
          <div class="info">
            <h3>Apr 5 – 6</h3>
            <p>Boat Rental Available</p>
          </div>
          <img class="card-map" src="assets/map2.png" alt="Map 2">
        </div>

        <div class="card">
          <div class="card-icon">
            <img src="assets/fly.svg" alt="Fly Icon">
          </div>
          <div class="info">
            <h3>May 19 – 22</h3>
            <p>Los Alerces</p>
          </div>
          <img class="card-map" src="assets/map3.png" alt="Map 3">
        </div>
      </section>
    </main>
  </div>

  <footer>
    © 2025 CastNet. Todos los derechos reservados.
  </footer>
</body>
</html>
